project:
  name: "Counterfeit Medicine Detector"
  version: "1.0.0"
  seed: 42

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  synthetic_authentic: "data/synthetic/authentic"
  synthetic_counterfeit: "data/synthetic/counterfeit"
  models: "models"
  outputs: "outputs"

dataset:
  image_size: 224
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  batch_size: 32
  num_workers: 4

model:
  backbone: "resnet50"
  pretrained: true
  frozen_layers: 3  
  dropout_1: 0.4
  dropout_2: 0.3
  hidden_dim: 512
  num_classes: 2

training:
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 5
  scheduler: "cosine"

classes:
  0: "Authentic"
  1: "Counterfeit"