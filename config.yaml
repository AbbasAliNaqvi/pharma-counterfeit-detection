project:
  name: "Counterfeit Medicine Detector"
  version: "1.0.0"
  seed: 42

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  synthetic_authentic: "data/synthetic/authentic"
  synthetic_counterfeit: "data/synthetic/counterfeit"
  models: "models"
  outputs: "outputs"

dataset:
  image_size: 224
  max_samples_per_class: 4000
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  batch_size: 16
  num_workers: 4

model:
  backbone: "mobilenet_v3_small"
  pretrained: true
  dropout: 0.3
  num_classes: 2

training:
  epochs: 25
  learning_rate: 0.0003
  weight_decay: 0.0001
  early_stopping_patience: 6
  scheduler: "cosine"

classes:
  0: "Authentic"
  1: "Counterfeit"